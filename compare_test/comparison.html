<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Comparison - https://example.com</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
        h1 { text-align: center; margin-bottom: 10px; }
        .url { text-align: center; color: #888; margin-bottom: 30px; word-break: break-all; }
        .comparison-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .device-comparison { background: #16213e; border-radius: 12px; padding: 20px; }
        .device-comparison h3 { margin-bottom: 15px; color: #e94560; font-size: 16px; }
        .device-comparison img { width: 100%; height: auto; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        @media (max-width: 768px) { .comparison-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <h1>📱 Device Comparison</h1>
    <div class="url">https://example.com</div>
    <div class="comparison-grid">
        
        <div class="device-comparison">
            <h3>iPhone 14</h3>
            <img src="/root/.openclaw/workspace/compare_test/comparison_iPhone_14.png" alt="iPhone 14" loading="lazy">
        </div>
        
        <div class="device-comparison">
            <h3>Pixel 7</h3>
            <img src="/root/.openclaw/workspace/compare_test/comparison_Pixel_7.png" alt="Pixel 7" loading="lazy">
        </div>
        
        <div class="device-comparison">
            <h3>iPad</h3>
            <img src="/root/.openclaw/workspace/compare_test/comparison_iPad.png" alt="iPad" loading="lazy">
        </div>
        
    </div>
</body>
</html>
