<svg viewBox="0 0 700 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .glyph { stroke: #1a1a1a; stroke-linecap: round; }
      .glyph-label { font-family: Georgia, serif; font-size: 10px; fill: #666; text-anchor: middle; }
    </style>
  </defs>
  
  <!-- Curve -->
  <g transform="translate(50, 50)">
    <path d="M -35 15 Q 0 -35 35 15" fill="none" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round"/>
    <text y="45" class="glyph-label">CURVE</text>
  </g>
  
  <!-- Line -->
  <g transform="translate(150, 50)">
    <line x1="-40" y1="0" x2="-5" y2="0" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round"/>
    <line x1="5" y1="0" x2="40" y2="0" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round"/>
    <text y="45" class="glyph-label">LINE</text>
  </g>
  
  <!-- Angle -->
  <g transform="translate(250, 50)">
    <path d="M -35 25 L 0 25 L 22 -15" fill="none" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <text y="45" class="glyph-label">ANGLE</text>
  </g>
  
  <!-- Vesica -->
  <g transform="translate(350, 50)">
    <circle cx="-12" cy="0" r="28" fill="none" stroke="#1a1a1a" stroke-width="6"/>
    <circle cx="12" cy="0" r="28" fill="none" stroke="#1a1a1a" stroke-width="6"/>
    <text y="45" class="glyph-label">VESICA</text>
  </g>
  
  <!-- Spiral -->
  <g transform="translate(450, 50)">
    <path d="M 0 0 m -5 0 a 5 5 0 0 1 10 0 a 8 8 0 0 1 -16 0 a 13 13 0 0 1 26 0 a 21 21 0 0 1 -42 0" 
          fill="none" stroke="#1a1a1a" stroke-width="6" stroke-linecap="round"/>
    <text y="45" class="glyph-label">SPIRAL</text>
  </g>
  
  <!-- Node -->
  <g transform="translate(550, 50)">
    <circle cx="0" cy="0" r="20" fill="none" stroke="#1a1a1a" stroke-width="8"/>
    <circle cx="0" cy="0" r="6" fill="#1a1a1a"/>
    <text y="45" class="glyph-label">NODE</text>
  </g>
  
  <!-- Field -->
  <g transform="translate(650, 50)">
    <circle cx="0" cy="0" r="8" fill="#1a1a1a"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="#1a1a1a" stroke-width="3" opacity="0.9"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#1a1a1a" stroke-width="2" opacity="0.6"/>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.3"/>
    <text y="45" class="glyph-label">FIELD</text>
  </g>
</svg>