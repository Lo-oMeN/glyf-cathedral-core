<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L∞M∆N Audio-Reactive — The Living Vesica Field</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            color: #fff;
        }
        
        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.3) 100%);
        }
        
        #ui {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            padding: 20px;
            border: 1px solid #333;
            border-radius: 8px;
            font-size: 11px;
            pointer-events: auto;
            backdrop-filter: blur(10px);
            min-width: 250px;
        }
        
        #ui h1 {
            font-size: 13px;
            margin-bottom: 15px;
            color: #ffd700;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        
        #ui .stat {
            margin: 8px 0;
            color: #888;
            display: flex;
            justify-content: space-between;
        }
        
        #ui .stat span {
            color: #fff;
            font-weight: bold;
        }
        
        #ui .stat-bar {
            height: 3px;
            background: #222;
            margin-top: 3px;
            border-radius: 2px;
            overflow: hidden;
        }
        
        #ui .stat-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ff6b00);
            transition: width 0.1s;
        }
        
        .control-group {
            margin: 15px 0;
            padding-top: 15px;
            border-top: 1px solid #222;
        }
        
        .control-group label {
            display: block;
            color: #666;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 8px 0;
        }
        
        input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            height: 4px;
            background: #333;
            border-radius: 2px;
            outline: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #ffd700;
            border-radius: 50%;
            cursor: pointer;
        }
        
        .slider-value {
            color: #ffd700;
            font-size: 10px;
            min-width: 35px;
            text-align: right;
        }
        
        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.9);
            padding: 12px 24px;
            border-radius: 30px;
            border: 1px solid #333;
            backdrop-filter: blur(10px);
            pointer-events: auto;
        }
        
        button {
            background: transparent;
            border: 1px solid #444;
            color: #888;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-family: inherit;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            white-space: nowrap;
        }
        
        button:hover {
            border-color: #666;
            color: #fff;
        }
        
        button.active {
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,107,0,0.2));
            border-color: #ffd700;
            color: #ffd700;
            box-shadow: 0 0 20px rgba(255,215,0,0.2);
        }
        
        button.primary {
            background: linear-gradient(135deg, #ffd700, #ff6b00);
            border-color: transparent;
            color: #000;
            font-weight: bold;
        }
        
        button.primary:hover {
            box-shadow: 0 0 30px rgba(255,215,0,0.4);
        }
        
        #audio-viz {
            position: fixed;
            bottom: 100px;
            left: 20px;
            width: 200px;
            height: 60px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #333;
            border-radius: 4px;
            pointer-events: none;
        }
        
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }
        
        #start-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        #start-screen h2 {
            font-size: 32px;
            color: #ffd700;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 20px;
        }
        
        #start-screen p {
            color: #666;
            margin-bottom: 40px;
            text-align: center;
            max-width: 500px;
            line-height: 1.6;
        }
        
        .preset-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            margin-top: 10px;
        }
        
        .preset-btn {
            padding: 8px;
            font-size: 9px;
            border-color: #333;
        }
        
        .preset-btn:hover {
            border-color: #555;
        }
        
        .double-preset-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            padding: 15px 20px;
            border: 1px solid #333;
            border-radius: 8px;
            font-size: 11px;
            display: none;
        }
        
        .double-preset-indicator.active {
            display: block;
        }
        
        .double-preset-indicator h3 {
            color: #ffd700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="overlay"></div>
    
    <!-- Start Screen -->
    <div id="start-screen">
        <h2>🜂 L∞M∆N 🜂</h2>
        <p>Audio-Reactive Vesica Field<br>Click to enable microphone input</p>
        <button class="primary" onclick="startAudio()">Initialize Field</button>
    </div>
    
    <!-- Stats UI -->
    <div id="ui">
        <h1>Field Metrics</h1>
        
        <div class="stat">Reflex: <span id="reflex">0</span></div>
        <div class="stat-bar"><div class="stat-bar-fill" id="reflex-bar" style="width: 0%"></div></div>
        
        <div class="stat">Emergence: <span id="emergence">0.000</span></div>
        <div class="stat-bar"><div class="stat-bar-fill" id="emergence-bar" style="width: 0%"></div></div>
        
        <div class="stat">Coherence: <span id="coherence">0.000</span></div>
        <div class="stat-bar"><div class="stat-bar-fill" id="coherence-bar" style="width: 0%"></div></div>
        
        <div class="control-group">
            <label>Audio Reactivity</label>
            <div class="slider-container">
                <input type="range" id="audio-sensitivity" min="0" max="200" value="100">
                <span class="slider-value" id="audio-val">1.0</span>
            </div>
        </div>
        
        <div class="control-group">
            <label>φ Scale</label>
            <div class="slider-container">
                <input type="range" id="phi-scale" min="50" max="300" value="100">
                <span class="slider-value" id="phi-val">1.0</span>
            </div>
        </div>
        
        <div class="control-group">
            <label>Self-Reference</label>
            <div class="slider-container">
                <input type="range" id="feedback" min="0" max="100" value="70">
                <span class="slider-value" id="feedback-val">0.70</span>
            </div>
        </div>
        
        <div class="control-group">
            <label>Presets</label>
            <div class="preset-grid">
                <button class="preset-btn" onclick="loadPreset('genesis')">Gen</button>
                <button class="preset-btn" onclick="loadPreset('bloom')">Blm</button>
                <button class="preset-btn" onclick="loadPreset('void')">Vd</button>
                <button class="preset-btn" onclick="loadPreset('spiral')">Spl</button>
                <button class="preset-btn" onclick="loadPreset('crystal')">Cry</button>
                <button class="preset-btn" onclick="loadPreset('pulse')">Pls</button>
                <button class="preset-btn" onclick="loadPreset('deep')">Dp</button>
                <button class="preset-btn" onclick="loadPreset('fellowship')">Flw</button>
            </div>
        </div>
    </div>
    
    <!-- Double Preset Indicator -->
    <div id="double-preset-indicator" class="double-preset-indicator">
        <h3>Double-Preset Mode</h3>
        <div class="stat">Blend: <span id="blend-amount">0%</span></div>
        <div class="stat">Pattern: <span id="blend-pattern">Plasma</span></div>
    </div>
    
    <!-- Audio Viz -->
    <canvas id="audio-viz"></canvas>
    
    <!-- Controls -->
    <div id="controls">
        <button id="btn-pause">⏸ Pause</button>
        <button id="btn-audio" class="active">🎤 Audio</button>
        <button id="btn-double">⚡ Double</button>
        <button id="btn-transition">↻ Plasma</button>
        <button id="btn-reset" class="primary">Genesis</button>
    </div>

    <script>
        // ============================================================================
        // L∞M∆N AUDIO-REACTIVE VISUALIZER
        // MilkDrop3-inspired with Vesica Interference Field
        // ============================================================================
        
        const PHI = 1.618033988749895;
        const PHI_7 = 29.034441161;
        const SQRT3 = 1.7320508075688772;
        const GOLDEN_ANGLE = 2.399963229728653;
        const TAU = Math.PI * 2;
        
        // Canvas setup
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const audioViz = document.getElementById('audio-viz');
        const audioCtx = audioViz.getContext('2d');
        
        let width, height;
        let frameA, frameB;
        let reflexCount = 0;
        let isPaused = false;
        let time = 0;
        
        // Audio
        let audioContext = null;
        let analyser = null;
        let microphone = null;
        let fftData = null;
        let audioEnabled = false;
        
        // Field parameters
        let params = {
            audioSensitivity: 1.0,
            phiScale: 1.0,
            feedbackStrength: 0.7,
            rotationSpeed: 0.02,
            circleARadius: 100,
            circleBRadius: 162,
            waveSpeed: 0.05,
            colorShift: 0,
        };
        
        // Double preset
        let doublePreset = {
            enabled: false,
            blendAmount: 0.5,
            pattern: 'plasma',
            presetA: null,
            presetB: null,
        };
        
        // Transition patterns
        const transitions = ['plasma', 'snail', 'triangle', 'donut', 'zoom', 'wave'];
        let currentTransition = 0;
        
        // Mouse
        const mouse = { x: 0, y: 0, active: false, dx: 0, dy: 0 };
        
        // Presets
        const presets = {
            genesis: { circleARadius: 100, circleBRadius: 162, feedbackStrength: 0.7, rotationSpeed: 0.02 },
            bloom: { circleARadius: 150, circleBRadius: 243, feedbackStrength: 0.9, rotationSpeed: 0.05 },
            void: { circleARadius: 80, circleBRadius: 130, feedbackStrength: 0.3, rotationSpeed: 0.01 },
            spiral: { circleARadius: 120, circleBRadius: 194, feedbackStrength: 0.8, rotationSpeed: 0.08 },
            crystal: { circleARadius: 90, circleBRadius: 146, feedbackStrength: 0.5, rotationSpeed: 0.04 },
            pulse: { circleARadius: 200, circleBRadius: 324, feedbackStrength: 0.6, rotationSpeed: 0.1 },
            deep: { circleARadius: 60, circleBRadius: 97, feedbackStrength: 0.85, rotationSpeed: 0.015 },
            fellowship: { circleARadius: 180, circleBRadius: 291, feedbackStrength: 0.75, rotationSpeed: 0.03 },
        };
        
        // ============================================================================
        // AUDIO SETUP
        // ============================================================================
        
        async function startAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                analyser.smoothingTimeConstant = 0.8;
                
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                microphone = audioContext.createMediaStreamSource(stream);
                microphone.connect(analyser);
                
                fftData = new Uint8Array(analyser.frequencyBinCount);
                audioEnabled = true;
                
                document.getElementById('start-screen').classList.add('hidden');
                console.log('🎤 Audio initialized');
            } catch (err) {
                alert('Audio access denied. Running in silent mode.');
                document.getElementById('start-screen').classList.add('hidden');
            }
        }
        
        function getAudioLevels() {
            if (!audioEnabled || !analyser) return { bass: 0, mid: 0, treble: 0, overall: 0 };
            
            analyser.getByteFrequencyData(fftData);
            
            // Frequency bands
            const bassEnd = Math.floor(fftData.length * 0.1);
            const midEnd = Math.floor(fftData.length * 0.5);
            
            let bass = 0, mid = 0, treble = 0;
            
            for (let i = 0; i < bassEnd; i++) bass += fftData[i];
            for (let i = bassEnd; i < midEnd; i++) mid += fftData[i];
            for (let i = midEnd; i < fftData.length; i++) treble += fftData[i];
            
            bass = bass / bassEnd / 255 * params.audioSensitivity;
            mid = mid / (midEnd - bassEnd) / 255 * params.audioSensitivity;
            treble = treble / (fftData.length - midEnd) / 255 * params.audioSensitivity;
            
            const overall = (bass + mid + treble) / 3;
            
            return { bass, mid, treble, overall };
        }
        
        // ============================================================================
        // RESIZE
        // ============================================================================
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            frameA = ctx.createImageData(width, height);
            frameB = ctx.createImageData(width, height);
            
            for (let i = 0; i < frameA.data.length; i += 4) {
                frameA.data[i] = 0;
                frameA.data[i + 1] = 0;
                frameA.data[i + 2] = 0;
                frameA.data[i + 3] = 255;
            }
            frameB.data.set(frameA.data);
        }
        
        // ============================================================================
        // CORE MATH
        // ============================================================================
        
        function sdVesica(px, py, c1x, c1y, r1, c2x, c2y, r2) {
            const d1 = Math.sqrt((px - c1x) ** 2 + (py - c1y) ** 2) - r1;
            const d2 = Math.sqrt((px - c2x) ** 2 + (py - c2y) ** 2) - r2;
            return Math.max(d1, d2);
        }
        
        function waveInterference(px, py, c1x, c1y, r1, phase1, c2x, c2y, r2, phase2, t, audio) {
            const d1 = Math.sqrt((px - c1x) ** 2 + (py - c1y) ** 2);
            const d2 = Math.sqrt((px - c2x) ** 2 + (py - c2y) ** 2);
            
            // Audio-modulated waves
            const freq1 = PHI * (1 + audio.bass * 0.5);
            const freq2 = PHI * (1 + audio.treble * 0.3);
            
            const wave1 = Math.cos(freq1 * d1 * 0.03 - phase1 - t * (1 + audio.mid));
            const wave2 = Math.cos(freq2 * d2 * 0.03 - phase2 - t * (1 + audio.bass * 0.5));
            
            return wave1 + wave2;
        }
        
        function interferenceToTernary(interference, feedback, strength) {
            const total = interference + strength * feedback;
            if (total > 0.5) return 1;
            if (total < -0.5) return -1;
            return 0;
        }
        
        function hsvToRgb(h, s, v) {
            const c = v * s;
            const x = c * (1 - Math.abs((h * 6) % 2 - 1));
            const m = v - c;
            
            let r, g, b;
            const hh = h * 6;
            if (hh < 1) [r, g, b] = [c, x, 0];
            else if (hh < 2) [r, g, b] = [x, c, 0];
            else if (hh < 3) [r, g, b] = [0, c, x];
            else if (hh < 4) [r, g, b] = [0, x, c];
            else if (hh < 5) [r, g, b] = [x, 0, c];
            else [r, g, b] = [c, 0, x];
            
            return [
                Math.floor((r + m) * 255),
                Math.floor((g + m) * 255),
                Math.floor((b + m) * 255)
            ];
        }
        
        function ternaryToColor(state, magnitude, audio) {
            const colorShift = params.colorShift + time * 0.1;
            
            if (state === 1) {
                // Constructive: Gold → Orange with audio reactivity
                const h = 0.08 + audio.bass * 0.1 + colorShift * 0.02;
                const s = 0.8 + magnitude * 0.2;
                const v = Math.min(1, 0.7 + audio.overall * 0.5);
                return hsvToRgb(h % 1, s, v);
            } else if (state === -1) {
                // Destructive: Deep Indigo with treble reactivity
                const h = 0.65 + audio.treble * 0.1 + colorShift * 0.02;
                const s = 0.7 + magnitude * 0.3;
                const v = Math.max(0.1, 0.3 - audio.overall * 0.2);
                return hsvToRgb(h % 1, s, v);
            } else {
                // Neutral: Cyan boundary
                const h = 0.5 + colorShift * 0.02;
                const s = 0.3 + audio.mid * 0.2;
                const v = 0.15 + audio.overall * 0.1;
                return hsvToRgb(h % 1, s, v);
            }
        }
        
        // ============================================================================
        // TRANSITION PATTERNS
        // ============================================================================
        
        function getTransitionFactor(x, y, pattern, progress) {
            const nx = x / width;
            const ny = y / height;
            const cx = nx - 0.5;
            const cy = ny - 0.5;
            const dist = Math.sqrt(cx * cx + cy * cy);
            const angle = Math.atan2(cy, cx);
            
            switch (pattern) {
                case 'plasma':
                    return Math.sin(nx * 10 + progress * TAU) * Math.cos(ny * 10) * 0.5 + 0.5;
                case 'snail':
                    return (dist * 2 + angle / TAU + progress) % 1;
                case 'triangle':
                    return (Math.abs(cx) + Math.abs(cy) + progress) % 1;
                case 'donut':
                    return Math.abs(dist - 0.3 + progress * 0.4);
                case 'zoom':
                    return dist < progress ? 1 : 0;
                case 'wave':
                    return Math.sin(nx * 20 + progress * TAU) * 0.5 + 0.5;
                default:
                    return progress;
            }
        }
        
        // ============================================================================
        // MAIN RENDER LOOP
        // ============================================================================
        
        let circleA = { x: 0, y: 0, phase: 0 };
        let circleB = { x: 0, y: 0, phase: 0 };
        
        function computeFrame() {
            const audio = getAudioLevels();
            const readFrame = reflexCount % 2 === 0 ? frameA : frameB;
            const writeFrame = reflexCount % 2 === 0 ? frameB : frameA;
            
            // Update phases
            circleA.phase += params.rotationSpeed * (1 + audio.bass);
            circleB.phase += params.rotationSpeed * PHI * (1 + audio.treble * 0.5);
            
            // Audio-reactive circle positions
            const baseRadius = params.circleARadius * params.phiScale;
            const floatRadius = 50 + audio.mid * 100;
            
            circleA.x = width / 2 + Math.cos(time * 0.5 + circleA.phase) * floatRadius;
            circleA.y = height / 2 + Math.sin(time * 0.3) * 30 - baseRadius * 0.3;
            
            circleB.x = width / 2 + Math.cos(time * 0.4 + circleB.phase + 1) * floatRadius * PHI * 0.6;
            circleB.y = height / 2 + Math.sin(time * 0.35 + 2) * 25 + baseRadius * 0.3;
            
            // Mouse disturbance
            if (mouse.active) {
                circleA.x += mouse.dx * 2;
                circleA.y += mouse.dy * 2;
            }
            
            // Audio explosion on strong bass
            if (audio.bass > 0.8) {
                circleA.x += (Math.random() - 0.5) * audio.bass * 50;
                circleA.y += (Math.random() - 0.5) * audio.bass * 50;
            }
            
            let posCount = 0, neuCount = 0, negCount = 0;
            let totalCoherence = 0;
            
            const step = 2;
            
            for (let y = 0; y < height; y += step) {
                for (let x = 0; x < width; x += step) {
                    const idx = (y * width + x) * 4;
                    const feedback = params.feedbackStrength > 0 
                        ? ((readFrame.data[idx] / 255) * 2 - 1) * params.feedbackStrength
                        : 0;
                    
                    // Base interference
                    let interference = waveInterference(
                        x, y,
                        circleA.x, circleA.y, baseRadius, circleA.phase,
                        circleB.x, circleB.y, baseRadius * PHI, circleB.phase,
                        time, audio
                    );
                    
                    // Double preset blending
                    if (doublePreset.enabled && doublePreset.presetA && doublePreset.presetB) {
                        const blend = getTransitionFactor(x, y, doublePreset.pattern, doublePreset.blendAmount);
                        // Mix interference from both presets
                        interference = interference * (1 - blend) + interference * blend * PHI;
                    }
                    
                    const state = interferenceToTernary(interference, feedback, 0.7);
                    
                    if (state === 1) posCount++;
                    else if (state === -1) negCount++;
                    else neuCount++;
                    
                    // Magnitude with audio reactivity
                    const interferenceX = waveInterference(
                        x + 2, y,
                        circleA.x, circleA.y, baseRadius, circleA.phase,
                        circleB.x, circleB.y, baseRadius * PHI, circleB.phase,
                        time, audio
                    );
                    const magnitude = Math.abs(interferenceX - interference) * (1 + audio.overall);
                    totalCoherence += magnitude;
                    
                    const [r, g, b] = ternaryToColor(state, magnitude, audio);
                    
                    for (let dy = 0; dy < step && y + dy < height; dy++) {
                        for (let dx = 0; dx < step && x + dx < width; dx++) {
                            const writeIdx = ((y + dy) * width + (x + dx)) * 4;
                            writeFrame.data[writeIdx] = r;
                            writeFrame.data[writeIdx + 1] = g;
                            writeFrame.data[writeIdx + 2] = b;
                            writeFrame.data[writeIdx + 3] = 255;
                        }
                    }
                }
            }
            
            ctx.putImageData(writeFrame, 0, 0);
            
            // Update stats
            reflexCount++;
            const total = posCount + neuCount + negCount;
            const emergence = reflexCount < 10 ? 0 : Math.min(1, 0.5 + 0.5 * (1 - Math.exp(-reflexCount * 0.01)));
            const coherence = total > 0 ? totalCoherence / total : 0;
            
            document.getElementById('reflex').textContent = reflexCount;
            document.getElementById('emergence').textContent = emergence.toFixed(3);
            document.getElementById('coherence').textContent = coherence.toFixed(3);
            document.getElementById('reflex-bar').style.width = Math.min(100, reflexCount / 10) + '%';
            document.getElementById('emergence-bar').style.width = (emergence * 100) + '%';
            document.getElementById('coherence-bar').style.width = Math.min(100, coherence * 50) + '%';
            
            // Draw audio viz
            if (audioEnabled && fftData) {
                audioCtx.fillStyle = '#000';
                audioCtx.fillRect(0, 0, 200, 60);
                const barWidth = 200 / fftData.length;
                for (let i = 0; i < fftData.length; i++) {
                    const barHeight = fftData[i] / 255 * 60;
                    const hue = i / fftData.length * 60 + 30; // Gold range
                    audioCtx.fillStyle = `hsl(${hue}, 100%, 50%)`;
                    audioCtx.fillRect(i * barWidth, 60 - barHeight, barWidth - 1, barHeight);
                }
            }
        }
        
        // ============================================================================
        // ANIMATION LOOP
        // ============================================================================
        
        function loop() {
            if (!isPaused) {
                time += 0.016;
                computeFrame();
            }
            requestAnimationFrame(loop);
        }
        
        // ============================================================================
        // UI CONTROLS
        // ============================================================================
        
        window.addEventListener('resize', resize);
        
        canvas.addEventListener('mousedown', (e) => {
            mouse.active = true;
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        
        canvas.addEventListener('mousemove', (e) => {
            if (mouse.active) {
                mouse.dx = e.clientX - mouse.x;
                mouse.dy = e.clientY - mouse.y;
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            }
        });
        
        canvas.addEventListener('mouseup', () => {
            mouse.active = false;
            mouse.dx = 0;
            mouse.dy = 0;
        });
        
        // Sliders
        document.getElementById('audio-sensitivity').addEventListener('input', (e) => {
            params.audioSensitivity = e.target.value / 100;
            document.getElementById('audio-val').textContent = params.audioSensitivity.toFixed(1);
        });
        
        document.getElementById('phi-scale').addEventListener('input', (e) => {
            params.phiScale = e.target.value / 100;
            document.getElementById('phi-val').textContent = params.phiScale.toFixed(1);
        });
        
        document.getElementById('feedback').addEventListener('input', (e) => {
            params.feedbackStrength = e.target.value / 100;
            document.getElementById('feedback-val').textContent = params.feedbackStrength.toFixed(2);
        });
        
        // Buttons
        document.getElementById('btn-pause').addEventListener('click', () => {
            isPaused = !isPaused;
            document.getElementById('btn-pause').textContent = isPaused ? '▶ Resume' : '⏸ Pause';
        });
        
        document.getElementById('btn-audio').addEventListener('click', () => {
            if (!audioEnabled) startAudio();
        });
        
        document.getElementById('btn-double').addEventListener('click', () => {
            doublePreset.enabled = !doublePreset.enabled;
            document.getElementById('btn-double').classList.toggle('active');
            document.getElementById('double-preset-indicator').classList.toggle('active');
            if (doublePreset.enabled) {
                doublePreset.presetA = { ...params };
                doublePreset.presetB = { ...presets.bloom };
            }
        });
        
        document.getElementById('btn-transition').addEventListener('click', () => {
            currentTransition = (currentTransition + 1) % transitions.length;
            doublePreset.pattern = transitions[currentTransition];
            document.getElementById('btn-transition').textContent = '↻ ' + transitions[currentTransition].charAt(0).toUpperCase() + transitions[currentTransition].slice(1);
        });
        
        document.getElementById('btn-reset').addEventListener('click', () => {
            reflexCount = 0;
            time = 0;
            loadPreset('genesis');
        });
        
        // Preset loader
        window.loadPreset = function(name) {
            const preset = presets[name];
            if (preset) {
                params.circleARadius = preset.circleARadius;
                params.circleBRadius = preset.circleBRadius;
                params.feedbackStrength = preset.feedbackStrength;
                params.rotationSpeed = preset.rotationSpeed;
                
                document.getElementById('feedback').value = params.feedbackStrength * 100;
                document.getElementById('feedback-val').textContent = params.feedbackStrength.toFixed(2);
                
                reflexCount = 0;
                console.log('Loaded preset:', name);
            }
        };
        
        // Keyboard shortcuts
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                isPaused = !isPaused;
                document.getElementById('btn-pause').textContent = isPaused ? '▶ Resume' : '⏸ Pause';
            }
            if (e.key === 'a') document.getElementById('btn-audio').click();
            if (e.key === 'd') document.getElementById('btn-double').click();
            if (e.key === 'r') document.getElementById('btn-reset').click();
        });
        
        // Initialize
        resize();
        loop();
        
        console.log('🜂 L∞M∆N Audio-Reactive Visualizer initialized');
        console.log('🜃 Click "Initialize Field" to enable microphone');
        console.log('🜄 Space = Pause | A = Audio | D = Double | R = Reset');
    </script>
</body>
</html>
