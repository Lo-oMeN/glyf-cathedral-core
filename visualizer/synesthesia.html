<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCE Synesthesia Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0f;
            color: #fff;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        
        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        
        #controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 15, 0.9);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #1a1a2e;
            min-width: 280px;
            z-index: 100;
        }
        
        #controls h1 {
            font-size: 14px;
            margin-bottom: 15px;
            color: #c9a227;
        }
        
        .control-group {
            margin-bottom: 15px;
        }
        
        .control-group label {
            display: block;
            font-size: 11px;
            color: #888;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        
        input[type="range"] {
            width: 100%;
            height: 4px;
            background: #1a1a2e;
            outline: none;
            -webkit-appearance: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #c9a227;
            border-radius: 50%;
            cursor: pointer;
        }
        
        button {
            background: #1a1a2e;
            color: #c9a227;
            border: 1px solid #c9a227;
            padding: 8px 16px;
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
            width: 100%;
            margin-bottom: 8px;
        }
        
        button:hover {
            background: #c9a227;
            color: #0a0a0f;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        #textInput {
            width: 100%;
            background: #1a1a2e;
            border: 1px solid #333;
            color: #fff;
            padding: 8px;
            font-family: inherit;
            font-size: 12px;
            margin-bottom: 10px;
        }
        
        #info {
            position: fixed;
            bottom: 20px;
            right: 20px;
            text-align: right;
            font-size: 11px;
            color: #666;
        }
        
        #info .value {
            color: #c9a227;
        }
        
        .audio-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #333;
            margin-right: 5px;
        }
        
        .audio-indicator.active {
            background: #0f0;
            box-shadow: 0 0 10px #0f0;
        }
        
        #audioVisualizer {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 200px;
            height: 60px;
            background: rgba(10, 10, 15, 0.9);
            border: 1px solid #1a1a2e;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <canvas id="audioVisualizer"></canvas>
    
    <div id="controls">
        <h1>🜁 GCE SYNTHESIA</h1>
        
        <div class="control-group">
            <label>Text Input (GCE Inference)</label>
            <input type="text" id="textInput" placeholder="Enter text..." value="Phi spirals encode meaning">
            <button id="inferBtn">Run Inference</button>
        </div>
        
        <div class="control-group">
            <label><span class="audio-indicator" id="audioIndicator"></span>Audio Input</label>
            <input type="file" id="audioInput" accept="audio/*" style="display:none">
            <button id="uploadBtn">Upload Audio</button>
            <button id="micBtn">Use Microphone</button>
        </div>
        
        <div class="control-group">
            <label>Phi Spiral Speed</label>
            <input type="range" id="speedSlider" min="0.1" max="2.0" step="0.1" value="0.5">
        </div>
        
        <div class="control-group">
            <label>Audio Reactivity</label>
            <input type="range" id="reactivitySlider" min="0" max="1" step="0.1" value="0.7">
        </div>
        
        <div class="control-group">
            <label>Manifold Rotation</label>
            <input type="range" id="rotationSlider" min="0" max="1" step="0.1" value="0.3">
        </div>
    </div>
    
    <div id="info">
        <div>Coherence: <span class="value" id="coherence">0.0000</span></div>
        <div>Position: <span class="value" id="position">0.00, 0.00, 0.00</span></div>
        <div>Manifold Norm: <span class="value" id="manifoldNorm">0.0000</span></div>
        <div>FPS: <span class="value" id="fps">0</span></div>
    </div>

    <script>
        // GCE TGM State
        const PHI = (1 + Math.sqrt(5)) / 2;
        const PHI_INV = 1 / PHI;
        
        let gceState = {
            position: [0, 0, 0, 0],
            coherence: 0.5,
            manifoldNorm: 0,
            embedding: null
        };
        
        // Audio Context
        let audioContext = null;
        let analyser = null;
        let audioSource = null;
        let frequencyData = null;
        let audioReactivity = 0.5;
        
        // Visualizer State
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const audioCanvas = document.getElementById('audioVisualizer');
        const audioCtx = audioCanvas.getContext('2d');
        
        let width, height;
        let time = 0;
        let spiralSpeed = 0.5;
        let rotationAmount = 0.3;
        let particles = [];
        
        // Resize handler
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            audioCanvas.width = 200;
            audioCanvas.height = 60;
        }
        window.addEventListener('resize', resize);
        resize();
        
        // GCE Inference (simplified JavaScript version)
        function gceInfer(text) {
            // Simple deterministic hash-based embedding
            let hash = 0;
            for (let i = 0; i < text.length; i++) {
                const char = text.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            
            // Generate position from hash
            const t = Math.abs(hash) / 2147483647;
            const x = Math.cos(t * Math.PI * 2 * PHI) * PHI_INV;
            const y = Math.sin(t * Math.PI * 2) * PHI_INV;
            const z = Math.cos(t * Math.PI * PHI) * PHI_INV * PHI_INV;
            const w = Math.sin(t * Math.PI * PHI * PHI) * 0.5;
            
            // Coherence based on text length and character distribution
            const coherence = 0.4 + (text.length % 10) / 20;
            const manifoldNorm = x*x + y*y + z*z - w*w;
            
            return {
                position: [x, y, z, w],
                coherence: coherence,
                manifoldNorm: manifoldNorm
            };
        }
        
        // Particle System
        class Particle {
            constructor() {
                this.reset();
            }
            
            reset() {
                const t = Math.random() * Math.PI * 2;
                const r = Math.pow(PHI, Math.random() * 2);
                this.x = Math.cos(t) * r;
                this.y = Math.sin(t) * r;
                this.z = (Math.random() - 0.5) * r;
                this.life = 1;
                this.decay = 0.005 + Math.random() * 0.01;
                this.size = 1 + Math.random() * 2;
                
                // Color based on position (phi-harmonic)
                const hue = ((t / (Math.PI * 2)) + PHI_INV) % 1;
                this.hue = hue * 360;
            }
            
            update(audioEnergy) {
                // Spiral motion
                const angle = time * spiralSpeed + this.life * PHI;
                const r = Math.sqrt(this.x*this.x + this.y*this.y);
                
                this.x = Math.cos(angle) * r;
                this.y = Math.sin(angle) * r;
                
                // Audio reactivity
                this.z += audioEnergy * 0.1 * (this.z > 0 ? 1 : -1);
                this.size = (1 + audioEnergy * 2) * this.life;
                
                this.life -= this.decay;
                
                if (this.life <= 0) this.reset();
            }
            
            draw(ctx, centerX, centerY, scale) {
                const screenX = centerX + this.x * scale;
                const screenY = centerY + this.y * scale;
                
                // Perspective projection based on z
                const perspective = 1 / (1 + this.z * 0.1);
                const size = this.size * perspective * scale * 0.1;
                
                const alpha = this.life * perspective;
                
                ctx.beginPath();
                ctx.arc(screenX, screenY, size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 70%, 50%, ${alpha})`;
                ctx.fill();
                
                // Glow
                ctx.beginPath();
                ctx.arc(screenX, screenY, size * 3, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 70%, 50%, ${alpha * 0.2})`;
                ctx.fill();
            }
        }
        
        // Initialize particles
        for (let i = 0; i < 200; i++) {
            particles.push(new Particle());
        }
        
        // Audio Setup
        async function initAudio(stream) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;
            
            if (stream) {
                audioSource = audioContext.createMediaStreamSource(stream);
            } else {
                const input = document.getElementById('audioInput');
                if (input.files.length > 0) {
                    const arrayBuffer = await input.files[0].arrayBuffer();
                    const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                    audioSource = audioContext.createBufferSource();
                    audioSource.buffer = audioBuffer;
                    audioSource.loop = true;
                    audioSource.start();
                }
            }
            
            audioSource.connect(analyser);
            frequencyData = new Uint8Array(analyser.frequencyBinCount);
            
            document.getElementById('audioIndicator').classList.add('active');
        }
        
        function getAudioEnergy() {
            if (!analyser || !frequencyData) return 0;
            
            analyser.getByteFrequencyData(frequencyData);
            
            // Calculate energy in different frequency bands
            let bass = 0, mid = 0, treble = 0;
            
            for (let i = 0; i < frequencyData.length; i++) {
                if (i < 10) bass += frequencyData[i];
                else if (i < 50) mid += frequencyData[i];
                else treble += frequencyData[i];
            }
            
            bass /= 10 * 255;
            mid /= 40 * 255;
            treble /= (frequencyData.length - 50) * 255;
            
            // Phi-weighted combination
            return (bass * PHI + mid + treble * PHI_INV) / (PHI + 1 + PHI_INV);
        }
        
        // Draw Audio Visualizer
        function drawAudioVisualizer() {
            audioCtx.fillStyle = '#0a0a0f';
            audioCtx.fillRect(0, 0, audioCanvas.width, audioCanvas.height);
            
            if (!frequencyData) return;
            
            const barWidth = audioCanvas.width / frequencyData.length;
            
            for (let i = 0; i < frequencyData.length; i++) {
                const barHeight = (frequencyData[i] / 255) * audioCanvas.height;
                const hue = (i / frequencyData.length) * 60 + 40; // Gold range
                
                audioCtx.fillStyle = `hsla(${hue}, 70%, 50%, 0.8)`;
                audioCtx.fillRect(
                    i * barWidth,
                    audioCanvas.height - barHeight,
                    barWidth - 1,
                    barHeight
                );
            }
        }
        
        // Main Render Loop
        let lastTime = 0;
        let frameCount = 0;
        let fpsTime = 0;
        
        function render(currentTime) {
            const deltaTime = (currentTime - lastTime) / 1000;
            lastTime = currentTime;
            
            // FPS counter
            frameCount++;
            if (currentTime - fpsTime > 1000) {
                document.getElementById('fps').textContent = frameCount;
                frameCount = 0;
                fpsTime = currentTime;
            }
            
            // Clear
            ctx.fillStyle = 'rgba(10, 10, 15, 0.3)';
            ctx.fillRect(0, 0, width, height);
            
            // Get audio energy
            const audioEnergy = getAudioEnergy() * document.getElementById('reactivitySlider').value;
            
            // Update time
            time += deltaTime * spiralSpeed * (1 + audioEnergy);
            
            // Center point (GCE position)
            const centerX = width / 2 + gceState.position[0] * 100;
            const centerY = height / 2 + gceState.position[1] * 100;
            
            // Draw phi spiral guide
            ctx.strokeStyle = 'rgba(201, 162, 39, 0.2)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            
            const spiralPoints = 200;
            for (let i = 0; i < spiralPoints; i++) {
                const t = (i / spiralPoints) * Math.PI * 4 + time;
                const r = Math.pow(PHI, t / (Math.PI * 2)) * 10;
                const x = centerX + Math.cos(t) * r;
                const y = centerY + Math.sin(t) * r;
                
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
            
            // Update and draw particles
            const scale = Math.min(width, height) / 4;
            particles.forEach(p => {
                p.update(audioEnergy);
                p.draw(ctx, centerX, centerY, scale);
            });
            
            // Draw GCE state center
            const pulseSize = 10 + audioEnergy * 30 + Math.sin(time * PHI) * 5;
            ctx.beginPath();
            ctx.arc(centerX, centerY, pulseSize, 0, Math.PI * 2);
            ctx.strokeStyle = `hsla(${40 + gceState.coherence * 40}, 70%, 50%, 0.8)`;
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Inner core
            ctx.beginPath();
            ctx.arc(centerX, centerY, pulseSize * 0.3, 0, Math.PI * 2);
            ctx.fillStyle = `hsla(${40 + gceState.coherence * 40}, 70%, 50%, ${0.5 + audioEnergy})`;
            ctx.fill();
            
            // Draw audio visualizer
            drawAudioVisualizer();
            
            requestAnimationFrame(render);
        }
        
        // Event Listeners
        document.getElementById('inferBtn').addEventListener('click', () => {
            const text = document.getElementById('textInput').value;
            gceState = gceInfer(text);
            
            document.getElementById('coherence').textContent = gceState.coherence.toFixed(4);
            document.getElementById('position').textContent = 
                `${gceState.position[0].toFixed(2)}, ${gceState.position[1].toFixed(2)}, ${gceState.position[2].toFixed(2)}`;
            document.getElementById('manifoldNorm').textContent = gceState.manifoldNorm.toFixed(4);
            
            // Reset particles with new state
            particles.forEach(p => p.reset());
        });
        
        document.getElementById('uploadBtn').addEventListener('click', () => {
            document.getElementById('audioInput').click();
        });
        
        document.getElementById('audioInput').addEventListener('change', () => {
            initAudio();
        });
        
        document.getElementById('micBtn').addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                initAudio(stream);
            } catch (err) {
                alert('Microphone access denied: ' + err.message);
            }
        });
        
        document.getElementById('speedSlider').addEventListener('input', (e) => {
            spiralSpeed = parseFloat(e.target.value);
        });
        
        document.getElementById('reactivitySlider').addEventListener('input', (e) => {
            audioReactivity = parseFloat(e.target.value);
        });
        
        document.getElementById('rotationSlider').addEventListener('input', (e) => {
            rotationAmount = parseFloat(e.target.value);
        });
        
        // Initial inference
        document.getElementById('inferBtn').click();
        
        // Start render loop
        requestAnimationFrame(render);
    </script>
</body>
</html>
