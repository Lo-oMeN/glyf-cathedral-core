<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#0a0a0f"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#c9a227" font-family="monospace" font-size="24" font-weight="bold">THE 7-SEGMENT FIELD</text>
  <text x="400" y="65" text-anchor="middle" fill="#888" font-family="monospace" font-size="14">Hamiltonian Path: K2→K5→K1→K4→K7→K3→K6</text>
  
  <!-- 7-Segment Grid Layout -->
  <g transform="translate(400, 300)">
    <!-- Segment 1 (K1 - Void) - Center -->
    <circle cx="0" cy="0" r="25" fill="none" stroke="#ff4444" stroke-width="3"/>
    <text x="0" y="5" text-anchor="middle" fill="#ff4444" font-family="monospace" font-size="12">K1</text>
    <text x="0" y="50" text-anchor="middle" fill="#ff4444" font-family="monospace" font-size="10">VOID</text>
    
    <!-- Segment 2 (K2 - Vesica) - Top -->
    <ellipse cx="0" cy="-120" rx="30" ry="20" fill="none" stroke="#c9a227" stroke-width="3"/>
    <text x="0" y="-115" text-anchor="middle" fill="#c9a227" font-family="monospace" font-size="12">K2</text>
    <text x="0" y="-155" text-anchor="middle" fill="#c9a227" font-family="monospace" font-size="10">VESICA</text>
    
    <!-- Segment 3 (K3 - Curve) - Bottom Right -->
    <path d="M 100 80 Q 130 100 100 120" fill="none" stroke="#44ff44" stroke-width="3"/>
    <text x="115" y="105" text-anchor="middle" fill="#44ff44" font-family="monospace" font-size="12">K3</text>
    <text x="140" y="145" text-anchor="middle" fill="#44ff44" font-family="monospace" font-size="10">CURVE</text>
    
    <!-- Segment 4 (K4 - Line) - Left -->
    <line x1="-120" y1="-30" x2="-120" y2="30" stroke="#4444ff" stroke-width="3"/>
    <text x="-120" y="5" text-anchor="middle" fill="#4444ff" font-family="monospace" font-size="12">K4</text>
    <text x="-120" y="55" text-anchor="middle" fill="#4444ff" font-family="monospace" font-size="10">LINE</text>
    
    <!-- Segment 5 (K5 - Angle) - Top Left -->
    <polyline points="-80,-100 -80,-60 -40,-60" fill="none" stroke="#ff44ff" stroke-width="3"/>
    <text x="-60" y="-75" text-anchor="middle" fill="#ff44ff" font-family="monospace" font-size="12">K5</text>
    <text x="-60" y="-115" text-anchor="middle" fill="#ff44ff" font-family="monospace" font-size="10">ANGLE</text>
    
    <!-- Segment 6 (K6 - Circle) - Bottom -->
    <circle cx="0" cy="120" r="25" fill="none" stroke="#44ffff" stroke-width="3"/>
    <text x="0" y="125" text-anchor="middle" fill="#44ffff" font-family="monospace" font-size="12">K6</text>
    <text x="0" y="165" text-anchor="middle" fill="#44ffff" font-family="monospace" font-size="10">CIRCLE</text>
    
    <!-- Segment 7 (K7 - Dot) - Bottom Left -->
    <circle cx="-100" cy="80" r="8" fill="#ffff44"/>
    <text x="-100" y="110" text-anchor="middle" fill="#ffff44" font-family="monospace" font-size="12">K7</text>
    <text x="-100" y="135" text-anchor="middle" fill="#ffff44" font-family="monospace" font-size="10">DOT</text>
    
    <!-- Hamiltonian Path -->
    <path d="M 0,-100 Q -60,-90 -60,-70 L -80,-70 L -110,-45 L -120,0 L -100,80 L 0,95" 
          fill="none" stroke="#fff" stroke-width="4" stroke-dasharray="10,5" opacity="0.8"/>
    
    <!-- Path arrows showing direction -->
    <polygon points="-10,-95 -5,-100 -10,-105" fill="#fff"/>
    <polygon points="-75,-65 -65,-70 -75,-75" fill="#fff"/>
    <polygon points="-115,-40 -125,-45 -115,-50" fill="#fff"/>
    <polygon points="-125,10 -120,0 -115,10" fill="#fff"/>
    <polygon points="-95,85 -100,75 -105,85" fill="#fff"/>
    <polygon points="5,100 0,95 -5,100" fill="#fff"/>
    
    <!-- Path labels -->
    <text x="-30" y="-90" fill="#fff" font-family="monospace" font-size="10">1</text>
    <text x="-70" y="-50" fill="#fff" font-family="monospace" font-size="10">2</text>
    <text x="-110" y="-20" fill="#fff" font-family="monospace" font-size="10">3</text>
    <text x="-135" y="30" fill="#fff" font-family="monospace" font-size="10">4</text>
    <text x="-110" y="65" fill="#fff" font-family="monospace" font-size="10">5</text>
    <text x="-50" y="105" fill="#fff" font-family="monospace" font-size="10">6</text>
  </g>
  
  <!-- Legend -->
  <g transform="translate(50, 500)">
    <text x="0" y="0" fill="#888" font-family="monospace" font-size="12">Legend:</text>
    <text x="0" y="20" fill="#c9a227" font-family="monospace" font-size="10">K2→K5→K1→K4→K7→K3→K6</text>
    <text x="0" y="40" fill="#888" font-family="monospace" font-size="10">Ergodic: visits each segment once</text>
    <text x="0" y="55" fill="#888" font-family="monospace" font-size="10">Non-repeating: never returns to same state</text>
  </g>
</svg>